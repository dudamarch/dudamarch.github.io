<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>guapis</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* VIDEO BACKGROUND */
.video-background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  overflow: hidden;
}

.video-background video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CARD */
.card{
  width:100vw;
  max-width:650px;
  aspect-ratio:1.586;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.8s;
  cursor:pointer;
}

.card.flip{
  transform:rotateY(180deg) scale(1.05);
}

.face{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:20px;
  overflow:hidden;
}

.face img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.back{
  transform:rotateY(180deg);
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<div class="video-background">
  <video autoplay muted loop playsinline>
    <source src="background.mp4" type="video/mp4">
  </video>
</div>

<!-- CARD -->
<div class="card" id="card">
  <div class="face">
    <img src="Frente.jpg.PNG">
  </div>

  <div class="face back">
    <img src="Verso.jpg.PNG">
  </div>
</div>

<script>
document.getElementById('card').onclick = function() {
  this.classList.toggle('flip');
}
</script>

</body>
</html>
