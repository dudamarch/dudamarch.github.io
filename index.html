<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cartão que Vira</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-image: url("Background.jpg");
}

.card{
  width:350px;
  height:250px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.8s;
  cursor:pointer;
}

.card.flip{
  transform:rotateY(180deg);
}

.face{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:20px;
  overflow:hidden;
}

.face img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.back{
  transform:rotateY(180deg);
}
</style>
</head>

<body>

<div class="card" id="card">
  <div class="face">
    <img src="frente.jpg.PNG">
  </div>

  <div class="face back">
    <img src="verso.jpg.PNG">
  </div>
</div>

<script>
document.getElementById('card').onclick = function() {
  this.classList.toggle('flip');
}
</script>

</body>
</html>
